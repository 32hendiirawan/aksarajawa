<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksara Jawa</title>
    <script type="text/javascript">
      if (top === self) {
        // Jika halaman dibuka langsung (tidak di dalam iframe),
        // alihkan paksa ke halaman utama blog Anda
        window.location.href = "https://o-cre.blogspot.com/p/aksara-jawa_10.html";
      }
    </script>
    <link rel="icon" type="image/png" href="assets/ocre.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Javanese:wght@400;700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="css/styleku.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AKSARA JAWA<br><span style="font-family: 'Noto Sans Javanese';">ꦲꦏ꧀ꦱꦫꦗꦮ</span></h1>
        <p><i>Transliterasi Huruf Latin ke Aksara Jawa</i></p>
    </div>

    <!-- Panel Konfigurasi -->
    <div class="config-panel">
        <label class="config-label">
            <input type="checkbox" id="optIgnoreSpace">
            <span>Abaikan Spasi</span>
        </label>
        <label class="config-label">
            <input type="checkbox" id="optDiphthong" checked>
            <span>Diftong (ai, au, ii)</span>
        </label>
        <label class="config-label">
            <input type="checkbox" id="optAksaraSwara" checked>
            <span>Aksara Swara</span>
        </label>
        <label class="config-label">
            <input type="checkbox" id="optMurda">
            <span>Aktifkan Murda</span>
        </label>
    </div>
    
    <!-- Kontainer Utama (Responsif: Desktop Sampingan, Mobile Atas-Bawah) -->
    <div class="main-content">
        <!-- Bagian Input -->
        <div class="form-group">
            <label for="inputLatin" class="form-label">Input Teks Latin:</label>
            <textarea id="inputLatin" class="textarea-input" placeholder="Ketik di sini..."></textarea>
        </div>

        <!-- Bagian Output -->
        <div class="form-group">
            <label class="form-label">Output Aksara Jawa:</label>
            <div class="output-container">
                <div id="outputJawa" class="output-box"></div>
                <button id="btnCopy" class="btn-copy">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="btnCopyText">Salin</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Bagian Footer / Panduan -->
    <div class="footer-guide">
        <p class="title">Catatan :</p>
        <ul class="guide-list">
            <li><span class="code-highlight">|</span> (tombol pipe) : Adeg-adeg (꧋), untuk awal paragraf</li>
            <li><span class="code-highlight">e</span> : Taling (ꦺ), contoh: b<b>e</b>b<b>e</b>k</li>
            <li><span class="code-highlight">x</span> : Pepet (ꦼ), contoh: c<b>ê</b>cak (otomatis berubah jadi ê)</li>
        </ul>
        <div style="margin-top: 10px;">
            <p>Kirim masukan atau saran ke <a href="https://wa.me/6282289015759" target="_blank" style="color: #25d366;">WhatsApp</a></p>
            <p>Dukungan pengembangan via <a href="https://saweria.co/32hendiirawan" target="_blank" style="color: #fa6400;">Saweria</a></p>
        </div>
    </div>
</div>

<script src="js/jawaku.js"></script>
</body>
</html>
